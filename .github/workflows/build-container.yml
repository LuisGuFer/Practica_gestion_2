name: Build and Test Container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: my-app:test
        # cache-from: type=gha
        # cache-to: type=gha,mode=max

    - name: Run container and test (ejemplo)
      run: |
        docker run --rm my-app:test --version
        # Aquí ejecutarías tus pruebas específicas, por ejemplo:
        # docker run --rm my-app:test pytest