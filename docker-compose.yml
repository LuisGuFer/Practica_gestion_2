version: '3.8'

services:
  web:
    build: .
    container_name: django_crud_app
    ports:
      - "8000:8000"
    volumes:
      # Monta el código local en el contenedor (útil en desarrollo)
      - .:/app
    environment:
      - DEBUG=True
      - DJANGO_SETTINGS_MODULE=myproject.settings
    restart: unless-stopped
